<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Raahi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/typography.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/auth.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
</head>
<body>

  <div class="auth-page">
    <div class="auth-left">
      <div class="auth-card">
        <a href="login.html" style="display: inline-flex; align-items: center; gap: 8px; color: var(--color-text-muted); font-size: 14px; font-weight: 500; margin-bottom: 32px; transition: color 0.2s;">
          ← Back to log in
        </a>

        <div class="auth-header">
          <h1>Forgot password?</h1>
          <p>No worries, we'll send you reset instructions.</p>
        </div>

        <div id="resetSuccess" class="auth-success hidden">
          <div class="auth-success-icon">✉️</div>
          <h2>Check your email</h2>
          <p>We've sent a password reset link to <strong id="resetEmailText"></strong>.</p>
          <a href="login.html" class="btn btn-primary btn-block btn-lg mt-6">Return to log in</a>
        </div>

        <form class="auth-form" id="forgotForm" onsubmit="event.preventDefault(); simulatePasswordReset();">
          <div class="input-group">
            <label for="email" class="input-label">College Email <span class="required">*</span></label>
            <input type="email" id="email" class="input" placeholder="student@college.edu.in" required>
            <span class="input-error-msg" style="display: none;"></span>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg mt-4" id="submitBtn">Reset password</button>
        </form>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-right-content">
        <div class="auth-right-illustration">🔐</div>
        <h2>Secure your account</h2>
        <p>Keep your travel plans and personal information safe.</p>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
